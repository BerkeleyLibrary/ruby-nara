services:

  db:
    image: mariadb:10
    environment:
      # Default password for the image is empty
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: NARA
    restart: always
    ports:
      - 3306:3306
    command: --ft-min-word-len=3
    volumes:
      - ./db/dumps:/docker-entrypoint-initdb.d

  app:
    build:
      context: .
      target: development
    depends_on:
      - db
    environment:
      DATABASE_URL: 'mysql2://root:root@db:3306/NARA'
      PUMA_DELAYED_STOP_DRAIN_SECONDS: 1
    ports:
      - 3000:3000
    restart: always
    stop_grace_period: 30s
    stop_signal: SIGQUIT
    volumes:
      - ./:/opt/app:delegated
